name: Firebase CI/CD

on:
  push:
    branches:
      - main
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: sistema_final/web/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: sistema_final/web

      - name: Run Tests
        run: npm test -- --watchAll=false
        working-directory: sistema_final/web
        continue-on-error: false

      - name: Build Frontend
        run: npm run build
        working-directory: sistema_final/web

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}'
          channelId: live
          projectId: pino-5fe44
          entryPoint: sistema_final/web
